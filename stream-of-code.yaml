# Docker Compose for Stream-of-code test
# Connects:
# - CodeStreamGenerator
# - CodeStreamConsumer
# - QualitasCorpus Volume

version: "3.8"
services:
  cs-generator:
    image: csgenerator
    command: "TEST"
    volumes:
      - qc-volume:/QualitasCorpus
    environment:
      DELAY: 0
      TARGET: "cs-consumer:3000"
  cs-consumer:
    image: csconsumer
    volumes:
      - ./Containers/CodeStreamConsumer/src:/app/src
      - ./logs:/app/logs
    ports:
      - 8080:3000

  dbstorage:
    image: mongo
    restart: always
    command: ["--quiet", "--syslog", "--wiredTigerCacheSizeGB", "2"]
    ports:
      - 27017:27017
    expose:
      - "27017"
    volumes:
      - dbstorage:/data/db
      - dbconfig:/data/configdb

  monitor-tool:
    build: ./MonitorTool
    environment:
      DBHOST: dbstorage
      NODE_OPTIONS: "--max-old-space-size=1024"
      STATS_SUMMARY: "/app/logs/summary.json"
    depends_on:
      - dbstorage
    volumes:
      - ./logs:/app/logs
volumes:
  qc-volume:
    external: true
  dbstorage:
  dbconfig:
    
