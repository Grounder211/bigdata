version: "3.8"

services:
  # =========================
  # CLONE DETECTOR (MAIN ENGINE)
  # =========================
  clone-detector:
    build: ./Containers/cljdetector
    container_name: cljdetector
    depends_on:
      - dbstorage
    volumes:
      - ./Containers/cljdetector:/usr/src/app
      - ./logs:/usr/src/app/logs
      - qc-volume:/QualitasCorpus   #  USE DOCKER VOLUME
    environment:
      DBHOST: dbstorage
      SOURCEDIR: "/QualitasCorpus/QualitasCorpus-20130901r/Systems"  
      CHUNKSIZE: 5
      BATCH_SIZE: 1000
      STATS_LOG: "/usr/src/app/logs/stats.ndjson"
      JAVA_OPTS: "-Xmx4g -Xms2g"
    command: ["lein", "run", "CLEAR"]   #  AUTO START
    stdin_open: true
    tty: true

  # =========================
  # MONITOR TOOL (DATA API)
  # =========================
  monitor-tool:
    build: ./MonitorTool
    container_name: monitor-tool
    depends_on:
      - dbstorage
    environment:
      DBHOST: dbstorage
      NODE_OPTIONS: "--max-old-space-size=1024"
      STATS_SUMMARY: "/app/logs/summary.json"
    volumes:
      - ./logs:/app/logs

  # =========================
  # MONITOR DASHBOARD (UI)
  # =========================
  monitor-dashboard:
    build: ./MonitorTool
    container_name: monitor-dashboard
    ports:
      - "3001:3001"
    depends_on:
      - dbstorage
    environment:
      DBHOST: dbstorage
      PORT: "3001"
    volumes:
      - ./logs:/app/logs

  # =========================
  # DATABASE
  # =========================
  dbstorage:
    image: mongo
    container_name: mongo-db
    restart: always
    command: ["--quiet", "--syslog", "--wiredTigerCacheSizeGB", "2"]
    ports:
      - "27017:27017"
    volumes:
      - dbstorage:/data/db
      - dbconfig:/data/configdb

# =========================
# VOLUMES
# =========================
volumes:
  dbstorage:
  dbconfig:
  qc-volume:
    external: true